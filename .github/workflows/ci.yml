name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm -r typecheck

      - name: Build all packages
        run: pnpm -r build

      - name: Run tests
        run: pnpm -r test

      - name: Validate package tarballs
        run: |
          (cd packages/spec && npm_config_cache=/tmp/agents-audit-npm-cache npm pack --dry-run --silent)
          (cd packages/rules && npm_config_cache=/tmp/agents-audit-npm-cache npm pack --dry-run --silent)
          (cd packages/agents-audit && npm_config_cache=/tmp/agents-audit-npm-cache npm pack --dry-run --silent)

      - name: Validate package exports
        run: |
          node -e "import('@workspacejson/spec')"
          node -e "import('@workspacejson/rules')"
          node -e "import('agents-audit')"

      - name: Run agents-audit on this repo
        run: node packages/agents-audit/dist/cli.js scan .
        continue-on-error: true
